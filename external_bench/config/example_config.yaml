# External Benchmark Cache Configuration
# Redis is the default and only runtime cache backend.

cache:
  enabled: REDIS_ENABLED
  backend: redis
  force_override_cache: false
  redis:
    host: REDIS_HOST
    port: REDIS_PORT
    password: REDIS_PASSWORD
    db: REDIS_DB
    key_prefix: REDIS_KEY_PREFIX
    ssl: REDIS_SSL
    ttl_seconds: null
  key_generator:
    cached_parameters:
      - "model"
      - "temperature"
      - "top_p"
      - "messages"
      - "reasoning_effort"
    hash_algorithm: blake2b
    hash_digest_size: 16
  conditions:
    cache_successful_only: true
    min_completion_tokens: 0
    cache_raw_response: false
    refresh_if_missing_raw_response: false
  log_level: INFO
  enable_stats: true
