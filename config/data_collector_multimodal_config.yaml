# LLMRouterBench Data Collector Configuration
# Small-scale example for testing

models:
  - name: intern-s1
    api_model_name: intern-s1
    base_url: https://intern.openxlab.org.cn/api/v1/
    api_key: INTERN_API_KEY
    temperature: 0.7
    top_p: 1.0
    timeout: 1200
    generator_type: multimodal
    pricing:
      prompt_price_per_million: 0.18
      completion_price_per_million: 0.54

datasets:
  - dataset_id: sfe
    splits: ["test"]

run:
  output_dir: ./results
  overwrite: false
  concurrency: 32
  log_level: INFO

cache:
  enabled: true
  backend: redis
  force_override_cache: false
  redis:
    host: REDIS_HOST
    port: REDIS_PORT
    password: REDIS_PASSWORD
    db: REDIS_DB
    key_prefix: REDIS_KEY_PREFIX
    ssl: REDIS_SSL
    ttl_seconds: null
  key_generator:
    cached_parameters: ["model", "temperature", "top_p", "messages", "reasoning_effort"]
    hash_algorithm: blake2b
    hash_digest_size: 16
  conditions:
    cache_successful_only: true
    min_completion_tokens: 0
    cache_raw_response: false
    refresh_if_missing_raw_response: false
  log_level: INFO
  enable_stats: true
