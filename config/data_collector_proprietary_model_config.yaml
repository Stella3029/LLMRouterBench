models:
  - name: gemini-2.5-flash
    api_model_name: google/gemini-2.5-flash
    base_url: https://openrouter.ai/api/v1
    api_key: OPENROUTER_API_KEY
    temperature: 0.2
    top_p: 1.0
    timeout: 1800
    extra_body:
      usage:
        include: true

  - name: gemini-2.5-pro
