datasets:
  - dataset_id: aime
    splits: ["hybrid"]
  - dataset_id: arenahard
    splits: ["test"]
  - dataset_id: arc-agi
    splits: ["v1"]
  - dataset_id: gpqa
    splits: ["test"]
  - dataset_id: hle
    splits: ["test"]
  - dataset_id: livecodebench
    splits: ["test"]
  - dataset_id: livemathbench
    splits: ["test"]
  - dataset_id: mmlupro
    splits: ["test_3000"]
  - dataset_id: simpleqa
    splits: ["test"]

run:
  output_dir: ./results
  overwrite: false
  concurrency: 32
  log_level: INFO

cache:
  enabled: true
  backend: redis
  force_override_cache: false
  redis:
    host: REDIS_HOST
    port: REDIS_PORT
    password: REDIS_PASSWORD
    db: REDIS_DB
    key_prefix: REDIS_KEY_PREFIX
    ssl: REDIS_SSL
    ttl_seconds: null
  key_generator:
    cached_parameters: ["model", "temperature", "top_p", "messages", "reasoning_effort"]
    hash_algorithm: blake2b
    hash_digest_size: 16
  conditions:
    cache_successful_only: true
    min_completion_tokens: 0
    cache_raw_response: false
    refresh_if_missing_raw_response: false
  log_level: INFO
  enable_stats: true

grader_cache:
  enabled: true
  backend: redis
  force_override_cache: false
  redis:
    host: REDIS_HOST
    port: REDIS_PORT
    password: REDIS_PASSWORD
    db: REDIS_DB
    key_prefix: REDIS_KEY_PREFIX
    ssl: REDIS_SSL
    ttl_seconds: null
  key_generator:
    cached_parameters:
      - model
      - messages
      - temperature
      - top_p
    hash_algorithm: blake2b
    hash_digest_size: 16
  conditions:
    cache_successful_only: true
    min_completion_tokens: 1
    cache_raw_response: false
    refresh_if_missing_raw_response: false
  log_level: INFO
  enable_stats: true
