# Cache Writer Configuration
# Legacy cache writer now targets Redis-shaped cache settings.

models: []

cache:
  enabled: true
  backend: redis
  force_override_cache: false
  redis:
    host: REDIS_HOST
    port: REDIS_PORT
    password: REDIS_PASSWORD
    db: REDIS_DB
    key_prefix: REDIS_KEY_PREFIX
    ssl: REDIS_SSL
    ttl_seconds: null
  key_generator:
    cached_parameters: ["model", "temperature", "top_p", "messages", "reasoning_effort"]
    hash_algorithm: blake2b
    hash_digest_size: 16
  conditions:
    cache_successful_only: true
    min_completion_tokens: 0
    cache_raw_response: false
    refresh_if_missing_raw_response: false
  log_level: INFO
  enable_stats: true

cache_writer:
  results_directory: "results/bench"
  skip_benchmarks: []
  include_datasets: ["arcc", "emorynlp", "gpqa", "mathbench", "medqa", "meld", "mmlupro", "winogrande"]
  temperature: 0.2
  top_p: 1.0
  batch_size: 1024
  show_progress: true
  max_records: null
  max_retries: 10
  retry_delay: 0.1
  enable_write_verification: true
  include_models: []
  exclude_models: []

datasets: []
run: {}
